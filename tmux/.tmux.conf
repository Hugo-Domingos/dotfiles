set-option -sa terminal-overrides ',xterm*:Tc'

set -g mouse on

# Change leader key to C-n 
set -g prefix C-b

set -sg escape-time 10
setw -g mode-keys vi

# Status Bar
set -g status-style "fg=default"
set -g status-bg default
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 10
set -g window-status-current-style "fg=blue bold"
set -g status-left ""
# So that when new windows are always created at the last index
set -g renumber-windows on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'christoomey/vim-tmux-navigator'


bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Max number of lines on the scrollback
set -g history-limit 100000


# set-option -g default-shell /usr/bin/zsh
set-option -g default-shell /bin/zsh

# Prevent scrol down when yanking text
set -g @yank_action "copy-pipe"

set-option -g set-clipboard on


# Put the homebrew installed apps at the PATH
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin:/usr/sbin:/sbin"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
